name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Mengaktifkan cache agar build berikutnya lebih cepat
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
          
      - name: Build Debug APK
        run: |
          # Menggunakan ./gradlew (wrapper) untuk menghindari error "Task not found"
          # --no-daemon digunakan agar lebih stabil di lingkungan CI
          # --stacktrace membantu melihat detail jika KSP error lagi
          ./gradlew clean assembleDebug --no-daemon --stacktrace
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anix-android-debug
          # Path wildcard agar tidak error jika nama file berbeda
          path: app/build/outputs/apk/debug/*.apk
