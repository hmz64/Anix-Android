name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          
      - name: Find project and build
        run: |
          pwd
          ls -la
          echo "===List files==="
          cat settings.gradle.kts | head -20
          echo "===Try simple build==="
          chmod +x gradlew
          ./gradlew build
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anix-android.apk
          path: app/build/outputs/apk/debug/app-debug.apk