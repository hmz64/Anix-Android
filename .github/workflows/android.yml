name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Fix Permissions
        run: chmod +x gradlew
          
      - name: Build Debug APK
        # Kita panggil perintahnya secara eksplisit di shell bash
        run: bash gradlew clean assembleDebug --no-daemon --stacktrace
